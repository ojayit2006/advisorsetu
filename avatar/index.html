<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MIA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;
  background:linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color:#f1f5f9;
}
#container {
  width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:20px; padding:32px;
  text-align:center;
}
.logo {
  width:72px; height:72px; border-radius:50%;
  background:rgba(122,27,27,0.2); border:2px solid rgba(122,27,27,0.4);
  display:flex; align-items:center; justify-content:center;
  font-size:32px; margin-bottom:4px;
}
h1 { font-size:22px; font-weight:700; margin:0; letter-spacing:0.5px; }
p { color:#94a3b8; font-size:14px; line-height:1.6; max-width:320px; margin:0; }
.btn-start {
  display:inline-flex; align-items:center; gap:8px;
  background:#7A1B1B; color:#fff; border:none; border-radius:10px;
  padding:14px 32px; font-size:15px; font-weight:600; cursor:pointer;
  transition:background 0.2s; margin-top:8px;
  text-decoration:none;
}
.btn-start:hover { background:#9B2B2B; }
.btn-start:active { transform:scale(0.97); }
.hint { color:#64748b; font-size:11px; max-width:280px; }
</style>
</head>
<body>
<div id="container">
  <div class="logo">🎙️</div>
  <h1>Talk to MIA</h1>
  <p>Your AI wealth advisor. Ask about your finances, goals, and investments.</p>
  <a class="btn-start" href="https://tavus.daily.co/cea5dac98a73f4d5" target="_blank" onclick="startConversation()">
    Start conversation →
  </a>
  <div class="hint">Opens in a new tab. Return here to see MIA's reasoning live.</div>
</div>
<script>
function startConversation() {
  try {
    window.parent.postMessage({ type: 'mia-conversation-started', url: 'https://tavus.daily.co/cea5dac98a73f4d5' }, '*');
  } catch (_) {}
}
</script>
</body>
</html>
